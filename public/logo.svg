<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Black background circle -->
  <circle cx="50" cy="50" r="48" fill="#0F172A"/>

  <!-- Chess King Crown — white, minimal -->
  <!-- Base bar -->
  <rect x="28" y="64" width="44" height="8" rx="2" fill="white"/>
  <!-- Crown body -->
  <rect x="32" y="52" width="36" height="14" rx="1" fill="white"/>
  <!-- Left spike -->
  <polygon points="33,52 38,52 36,36" fill="white"/>
  <!-- Center spike (tallest) -->
  <polygon points="46,52 54,52 50,28" fill="white"/>
  <!-- Right spike -->
  <polygon points="62,52 67,52 65,36" fill="white"/>
  <!-- Cross on top center spike -->
  <rect x="47.5" y="20" width="5" height="14" rx="1" fill="white"/>
  <rect x="43" y="24" width="14" height="4" rx="1" fill="white"/>

  <!-- Scythe slash — gold diagonal arc cutting through -->
  <path
    d="M 20 78 Q 55 20 80 30"
    stroke="#EDBE52"
    stroke-width="4"
    stroke-linecap="round"
    fill="none"
  />
  <!-- Scythe blade tip -->
  <path
    d="M 78 24 Q 88 28 80 30 Q 82 20 78 24"
    fill="#EDBE52"
  />

  <!-- Gold ring border -->
  <circle cx="50" cy="50" r="47" fill="none" stroke="#EDBE52" stroke-width="1.5" opacity="0.4"/>
</svg>
