       L32 72
       Q28 70 26 65
       Q24 58 28 52
       Q30 47 28 43
       Q27 38 30 35
       Q34 31 38 33
       Q40 28 44 26
       Q50 22 56 24
       Q62 26 64 32
       Q66 38 62 44
       Q60 48 62 54
       Q66 62 64 70
       Q62 76 58 78
       L68 82
       Z"
    fill="#EDBE52"
  />
  <!-- Eye -->
  <circle cx="54" cy="36" r="3" fill="#0F172A"/>
  <!-- Nostril -->
