    <!-- Finger holes -->
    <circle cx="38" cy="50" r="2" fill="#0F172A"/>
    <circle cx="47" cy="50" r="2" fill="#0F172A"/>
    <circle cx="56" cy="50" r="2" fill="#0F172A"/>
    <circle cx="65" cy="50" r="2" fill="#0F172A"/>
  </g>
</svg>
